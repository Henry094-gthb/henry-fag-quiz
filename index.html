<!DOCTYPE html>

<meta charset="UTF-8">
<title>Flaggen Quiz</title>
    <style>
body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    gap: 20px; 
    background: linear-gradient(135deg, #2d2c2c, #29313c);
    font-family: 'Segoe UI', sans-serif;
    color: white;
    padding: 20px;
    box-sizing: border-box;
}

img {
    width: 100%;
    height: auto;
    max-width: 350px;
    border-radius: 15px;
    box-shadow: 0 8px 25px rgba(255, 255, 255, 0.4);
}

input {
    width: 90%;
    max-width: 350px;
    padding: 18px;
    font-size: 20px;
    border: none;
    outline: none;
    border-radius: 12px;
    text-align: center;
    background: rgba(130, 128, 128, 0.1);
    color: rgb(255, 255, 255);
    box-sizing: border-box;
    backdrop-filter: blur(5px);
    box-shadow: 0 8px 8px rgba(255, 255, 255, 0.4);
}

button {
    width: 70%;
    max-width: 220px;
    padding: 15px;
    font-size: 18px;
    font-weight: bold;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg,#2d2c2c, #29313c);
    color: white;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    box-shadow: 0 4px 15px rgba(255, 255, 255, 0.4);
}

.image-container {
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: center;
    gap: 20px;
    width: 200px;
    height: 100px;
}

#flagImage {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
}

#feedBack {
    display: flex;
    gap: 20px;
    justify-content: center;
    align-items: center;
    font-size: 20px;
}

#feedBack[hidden] {
    display: none;
}

#feedBack p {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    border-radius: 10px;
    background: rgba(65, 62, 62, 0.1);
}

#right::before {
    content: "";
    width: 18px;
    height: 18px;
    display: inline-block;
    background: no-repeat center/contain url("data:image/svg+xml;utf8,<svg viewBox='0 0 24 24' fill='none' stroke='%2322c55e' stroke-width='3' stroke-linecap='round' stroke-linejoin='round' xmlns='http://www.w3.org/2000/svg'><polyline points='20 6 9 17 4 12'/></svg>");
    box-shadow: 0 8px 25px rgba(56, 156, 6, 0.8);
}

#wrong::before {
    content: "";
    width: 16px;
    height: 16px;
    display: inline-block;
    background:
        linear-gradient(#ef4444, #ef4444),
        linear-gradient(#ef4444, #ef4444);
    background-size: 3px 100%, 100% 3px;
    background-position: center;
    background-repeat: no-repeat;
    transform: rotate(45deg);
    box-shadow: 0 8px 25px rgba(208, 17, 17, 0.7);
}

@media (min-width: 768px) {
    .image-container {
        width: 350px;
        height: 175px;
    }
}

</style>
</head>

let currentFlag = null;

function showName() {
let flagCurrent = currentFlag.name;
const getButton = document.getElementById("showBtn");
getButton.innerText = flagCurrent;
const getInput = document.getElementById("answerInput");
getInput.focus();
}

function buttonToDefault() {
const showButton = document.getElementById("showBtn");
let defaultButton = "Auflösen";
showButton.innerText = defaultButton;
const getInput = document.getElementById("answerInput");
getInput.focus();
}

function normalize(str) {
return str
.toLowerCase()
.trim()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g, "");
}

function pickRandomFlag() {
const randomIndex = Math.floor(Math.random() * flags.length);
currentFlag = flags[randomIndex];
document.getElementById("flagImage").src = currentFlag.imageUrl;
document.getElementById("answerInput").value = "";
const showButton = document.getElementById("showBtn");
let defaultButton = "Auflösen";
showButton.innerText = defaultButton;
document.getElementById("wrong").innerText = wrong;
addToRight = 1;
wrongSkip = 1;
}

function checkAnswer() {
const input = normalize(document.getElementById("answerInput").value);
const correctAnswers = currentFlag.answers.map(a => normalize(a));
const isCorrect = correctAnswers.includes(input);

if (isCorrect) {
right += addToRight;
pickRandomFlag();
document.getElementById("right").innerText = right;
} 
}

let right = 0;
document.getElementById("right").innerText = right;
let addToRight = 1;

function updtRight() {
addToRight = 0;
document.getElementById("wrong").innerText = wrong;
}

let wrong = 0;
document.getElementById("wrong").innerText = wrong;
let wrongSkip = 1;

function wrongAnswerShow() {
wrong += wrongSkip;
wrongSkip = 0;
}

function wrongAnswerSkip() {
wrong += wrongSkip;
}

function toggleScore() {
const paragraph = document.getElementById("feedBack");
paragraph.hidden = !paragraph.hidden;
}

function inputAim() {
const getInput = document.getElementById("answerInput");
getInput.focus();
}

document.getElementById("answerInput").addEventListener("input", checkAnswer);
